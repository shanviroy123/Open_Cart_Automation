name: OpenCart Automation CI

on:
  push:
    branches:
      - main
      - master
      pull_request:
          branches:
            - main
            - master

jobs:
test:
runs-on: windows-latest

steps:
  - name: Checkout Repository
    uses: actions/checkout@v4
    with:
      token: ${{ secrets.PAT_TOKEN }}

  - name: Set up JDK 17
    uses: actions/setup-java@v4
    with:
      distribution: temurin
      java-version: '17'
      cache: maven

  - name: Build Project
    run: mvn clean compile

  - name: Run Tests
    run: mvn test

  - name: Upload Test Reports
    if: always()
    uses: actions/upload-artifact@v4
    with:
      name: TestNG-Reports
      path: test-output/
